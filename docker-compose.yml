services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      # Forced regardless of .env, so the named volume below always works.
      ATLAS_DATABASE_URL: sqlite+aiosqlite:////app/data/atlas.db
    volumes:
      - atlas-data:/app/data

volumes:
  atlas-data:
